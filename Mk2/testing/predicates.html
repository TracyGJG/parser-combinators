<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Predicates</title>
  </head>
  <body>
    <script type="module">
      import {
        isArrayStart,
        isArrayEnd,
        isValueSeparater,
        // ====
        isNegative,
        isZero,
        isLeadingDigit,
        isDigit,
        // ----
        isDecimalPoint,
        // ----
        isExponentChar,
        isSignChar,
        // ====
        isObjectStart,
        isObjectEnd,
        isKeySeparater,
        // ====
        isStringDelim,
        isPrintableChar,
        isEscapeChar,
        isUnicodeChar,
        // ====
        isTrue,
        isFalse,
        isNull,
        // ====
        isWhitespaceChar,
      } from '../predicates.js';

      // ----------------------------

      const testIsArrayStart = false;
      if (testIsArrayStart) {
        test(isArrayStart, '[', true);
        test(isArrayStart, ']');
      }

      const testIsArrayEnd = false;
      if (testIsArrayEnd) {
        test(isArrayEnd, ']', true);
        test(isArrayEnd, '[');
      }

      const testIsValueSeparater = false;
      if (testIsValueSeparater) {
        test(isValueSeparater, ',', true);
        test(isValueSeparater, ':');
      }

      // ----------------------------

      // Number - Integer
      const testIsNegative = false;
      if (testIsNegative) {
        test(isNegative, '-', true);
        test(isNegative, '_');
      }

      const testIsZero = false;
      if (testIsZero) {
        test(isZero, '0', true);
        test(isZero, '1');
      }

      const testIsLeadingDigit = false;
      if (testIsLeadingDigit) {
        test(isLeadingDigit, '1', true);
        test(isLeadingDigit, '9', true);
        test(isLeadingDigit, '0');
      }

      const testIsDigit = false;
      if (testIsDigit) {
        test(isDigit, '1', true);
        test(isDigit, '9', true);
        test(isDigit, '0', true);
        test(isDigit, 'A');
      }

      // Number - Fraction

      const testIsDecimalPoint = false;
      if (testIsDecimalPoint) {
        test(isDecimalPoint, '.', true);
        test(isDecimalPoint, ',');
      }

      // Number - Exponent

      const testIsExponentChar = false;
      if (testIsExponentChar) {
        test(isExponentChar, 'E', true);
        test(isExponentChar, 'e', true);
        test(isExponentChar, ',');
      }

      const testIsSignChar = false;
      if (testIsSignChar) {
        test(isSignChar, '+', true);
        test(isSignChar, '-', true);
        test(isSignChar, '*');
      }

      // ----------------------------

      const testIsObjectStart = false;
      if (testIsObjectStart) {
        test(isObjectStart, '{', true);
        test(isObjectStart, '}');
      }

      const testIsObjectEnd = false;
      if (testIsObjectEnd) {
        test(isObjectEnd, '}', true);
        test(isObjectEnd, '{');
      }

      const testIsKeySeparater = false;
      if (testIsKeySeparater) {
        test(isKeySeparater, ':', true);
        test(isKeySeparater, ',');
      }

      // ----------------------------

      const testIsStringDelim = false;
      if (testIsStringDelim) {
        test(isStringDelim, '"', true);
        test(isStringDelim, "'");
      }

      const testIsPrintableChar = false;
      if (testIsPrintableChar) {
        test(isPrintableChar, ' ', true);
        test(isPrintableChar, 'A', true);
        test(isPrintableChar, '\u007f');
        test(isPrintableChar, '"');
        test(isPrintableChar, '\\');
      }

      const testIsEscapeChar = false;
      if (testIsEscapeChar) {
        test(isEscapeChar, '\\"', true);
        test(isEscapeChar, '\\\\', true);
        test(isEscapeChar, '\\/', true);
        test(isEscapeChar, '\\b', true);
        test(isEscapeChar, '\\f', true);
        test(isEscapeChar, '\\n', true);
        test(isEscapeChar, '\\r', true);
        test(isEscapeChar, '\\t', true);
        test(isEscapeChar, '\\u');
      }

      const testIsUnicodeChar = false;
      if (testIsUnicodeChar) {
        test(isUnicodeChar, '\\u0000', true);
        test(isUnicodeChar, '\\uffff', true);
        test(isUnicodeChar, '\\uFFFF', true);
        test(isUnicodeChar, '\\u00000');
        test(isUnicodeChar, '\\u000');
        test(isUnicodeChar, '\\u000g');
      }

      // ----------------------------

      const testLiterals = false;
      if (testLiterals) {
        test(isTrue, 'true', true);
        test(isFalse, 'false', true);
        test(isNull, 'null', true);
        test(isTrue, 'true, ');
        test(isFalse, 'false, ');
        test(isNull, 'null, ');
        test(isTrue, ': true, ');
        test(isFalse, ': false, ');
        test(isNull, ': null, ');
      }

      // ----------------------------

      const testIsWhitespaceChar = false;
      if (testIsWhitespaceChar) {
        test(isWhitespaceChar, ' ', true);
        test(isWhitespaceChar, `\n`, true);
        test(isWhitespaceChar, `\t`, true);
        test(isWhitespaceChar, `\r`, true);
        test(isWhitespaceChar, 'A');
      }

      // ============================

      function test(fn, chr, expected = false) {
        const actual = fn(chr);
        console.log(
          fn.name,
          actual,
          expected === actual ? 'PASSED' : 'FAILED',
          `|${chr}|`,
          chr.length
        );
      }
    </script>
  </body>
</html>
